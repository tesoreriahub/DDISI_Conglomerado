                  <div style={{fontSize:10,color:"#64748b",marginBottom:3}}>🆚 Entidad a comparar</div>
                  <select value={entB} onChange={e=>setEntB(e.target.value)}
                    style={{width:"100%",padding:"6px 8px",borderRadius:7,border:"1px solid #e2e8f0",fontSize:11}}>
                    {ENTIDADES_LIST.filter(e=>e!==entA).map(e=><option key={e} value={e}>{cap(e)}</option>)}
                  </select>
                </div>
              )}
            </div>
          </div>

          {/* KPIs */}
          <div style={{display:"grid",gridTemplateColumns:`repeat(${cmp?4:3},1fr)`,gap:10,marginBottom:14}}>
            {[
              {icon:"🏢",label:"Entidad",val:entLabel(entA),col:C[0]},
              {icon:"🎯",label:"Cumplimiento",val:`${dA.gl?.toFixed(1)}%`,sub:dA.gl>=70?"✓ Aceptable":dA.gl>=50?"⚠ En riesgo":"✗ Crítico",scol:clr(dA.gl),col:C[0]},
              ...(cmp?[
                {icon:"🏢",label:"Comparar con",val:entLabel(entB),col:C[1]},
                {icon:"🎯",label:"Cumplimiento",val:`${dB.gl?.toFixed(1)}%`,sub:dB.gl>=70?"✓ Aceptable":dB.gl>=50?"⚠ En riesgo":"✗ Crítico",scol:clr(dB.gl),col:C[1]},
              ]:[{icon:"🌐",label:"Promedio Global",val:"68.55%",sub:"⚠ En riesgo",scol:"#f59e0b",col:"#64748b"}]),
            ].map((k,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:10,padding:"12px 14px",
                boxShadow:"0 1px 3px rgba(0,0,0,.07)",borderTop:`3px solid ${k.col}`}}>
                <div style={{fontSize:18}}>{k.icon}</div>
                <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{k.label}</div>
                <div style={{fontSize:14,fontWeight:700,color:"#1e293b",margin:"2px 0",lineHeight:1.2}}>{k.val}</div>
                {k.sub && <div style={{fontSize:10,fontWeight:600,color:k.scol}}>{k.sub}</div>}
              </div>
            ))}
          </div>

          {/* TABS */}
          <div className="no-print" style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
            {[["resumen","📊 Resumen"],["conceptos","🔐 Conceptos"],["areas","🏢 Áreas"],
              ["genero","♀♂ Género"],["tipo","🔖 Tipo"],["ocupacion","💼 Ocupación"]].map(([id,l])=>
              <TabBtn key={id} id={id} label={l} active={tab===id} onClick={setTab}/>)}
          </div>

          {/* RESUMEN */}
          {tab==="resumen" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <Card title={cmp?`Radar — ${entLabel(entA)} vs ${entLabel(entB)}`:`Radar de Conceptos — ${entLabel(entA)}`}>
                <ResponsiveContainer width="100%" height={230}>
                  <RadarChart data={CK.map(c=>({name:c.label.slice(0,13),A:dA[c.k],B:dB[c.k]}))}>
                    <PolarGrid stroke="#f1f5f9"/>
                    <PolarAngleAxis dataKey="name" tick={{fontSize:8}}/>
                    <Radar name={entLabel(entA)} dataKey="A" stroke={C[0]} fill={C[0]} fillOpacity={.2} strokeWidth={2}/>
                    {cmp && <Radar name={entLabel(entB)} dataKey="B" stroke={C[1]} fill={C[1]} fillOpacity={.15} strokeWidth={2}/>}
                    <Tooltip formatter={v=>`${v?.toFixed(1)}%`}/>
                    {cmp && <Legend wrapperStyle={{fontSize:9}}/>}
                  </RadarChart>
                </ResponsiveContainer>
              </Card>

              <Card title="Ranking de Conceptos">
                {[...CK].sort((a,b)=>dA[b.k]-dA[a.k]).map((c,i)=>(
                  <div key={i} style={{marginBottom:7}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#475569",marginBottom:2}}>
                      <span>{c.label}</span>
                      <div style={{display:"flex",gap:8}}>
                        <span style={{fontWeight:700,color:clr(dA[c.k])}}>{dA[c.k]?.toFixed(1)}%</span>
                        {cmp && <span style={{fontWeight:700,color:C[1]}}>{dB[c.k]?.toFixed(1)}%</span>}
                      </div>
                    </div>
                    <div style={{background:"#f1f5f9",borderRadius:99,height:5,overflow:"hidden",position:"relative"}}>
                      <div style={{position:"absolute",width:`${dA[c.k]}%`,height:"100%",background:C[0],borderRadius:99}}/>
                      {cmp && <div style={{position:"absolute",width:`${dB[c.k]}%`,height:"100%",background:C[1],borderRadius:99,opacity:.5}}/>}
                    </div>
                  </div>
                ))}
              </Card>

              <Card title="Comparativo entre Todas las Entidades" col="1/-1">
                <ResponsiveContainer width="100%" height={190}>
                  <BarChart data={ENTIDADES_LIST.filter(e=>e!=="Todas las entidades").map(e=>({name:cap(e).slice(0,18),pct:T4[e]?.gl}))}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                    <XAxis dataKey="name" tick={{fontSize:8}} interval={0}/>
                    <YAxis domain={[0,100]} tickFormatter={v=>`${v}%`} tick={{fontSize:9}}/>
                    <Tooltip formatter={v=>`${v?.toFixed(1)}%`}/>
                    <Bar dataKey="pct" radius={[4,4,0,0]}>
                      {ENTIDADES_LIST.filter(e=>e!=="Todas las entidades").map((e,i)=><Cell key={i} fill={clr(T4[e]?.gl)}/>)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </Card>

              <Card title={`📋 Análisis — ${entLabel(entA)}`} col="1/-1">
                <div style={{background:"#f8fafc",borderRadius:8,padding:"12px 14px",fontSize:12,color:"#334155",lineHeight:1.6}}>
                  {getAnalysis(entA,dA)}
                </div>
                {cmp && <div style={{background:"#f0fdf4",borderRadius:8,padding:"12px 14px",fontSize:12,color:"#334155",lineHeight:1.6,marginTop:8,borderLeft:`3px solid ${C[1]}`}}>
                  {getAnalysis(entB,dB)}
                </div>}
              </Card>
            </div>
          )}

          {/* CONCEPTOS */}
          {tab==="conceptos" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <Card title="Barras por Concepto" col="1/-1">
                <BarsChart data={conceptosData} kA={entA} kB={entB} xKey="concepto" h={220}/>
              </Card>
              {CK.map((c,i)=>{
                const cB=dB[c.k];
                return (
                  <Card key={i} title={c.label}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                      <span style={{padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:700,background:bg(dA[c.k]),color:fc(dA[c.k])}}>{dA[c.k]?.toFixed(1)}%</span>
                      {cmp && <span style={{padding:"2px 8px",borderRadius:99,fontSize:11,fontWeight:700,background:bg(cB),color:fc(cB)}}>{cB?.toFixed(1)}%</span>}
                    </div>
                    <div style={{background:"#f1f5f9",borderRadius:99,height:7,marginBottom:4}}>
                      <div style={{width:`${dA[c.k]}%`,height:"100%",background:C[0],borderRadius:99}}/>
                    </div>
                    {cmp && <><div style={{background:"#f1f5f9",borderRadius:99,height:7,marginBottom:4}}>
                      <div style={{width:`${cB}%`,height:"100%",background:C[1],borderRadius:99}}/>
                    </div>
                    <div style={{fontSize:10,color:dA[c.k]>=cB?"#10b981":"#ef4444",fontWeight:600}}>
                      {dA[c.k]>=cB?"▲":"▼"} Dif: {Math.abs(dA[c.k]-cB).toFixed(1)}pp
                    </div></>}
                    <div style={{fontSize:10,color:"#64748b",marginTop:4}}>{dA[c.k]>=70?"✓ Aceptable":dA[c.k]>=50?"⚠ Atención":"✗ Crítico"}</div>
                  </Card>
                );
              })}
            </div>
          )}

          {/* ÁREAS */}
          {tab==="areas" && (
            <div style={{display:"grid",gridTemplateColumns:cmp?"1fr 1fr":"1fr",gap:14}}>
              {[{e:entA,data:areasA},...(cmp?[{e:entB,data:areasB}]:[])].map(({e,data})=>(
                <Card key={e} title={`Áreas — ${entLabel(e)}`}>
                  {data.length===0
                    ? <p style={{fontSize:11,color:"#94a3b8"}}>No hay datos de áreas para esta entidad.</p>
                    : <ResponsiveContainer width="100%" height={Math.max(200,data.length*26)}>
                        <BarChart data={data} layout="vertical" margin={{left:10,right:40}}>
                          <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                          <XAxis type="number" domain={[0,100]} tickFormatter={v=>`${v}%`} tick={{fontSize:9}}/>
                          <YAxis type="category" dataKey="area" width={170} tick={{fontSize:9}}/>
                          <Tooltip formatter={v=>`${v?.toFixed(1)}%`}/>
                          <Bar dataKey="pct" radius={[0,5,5,0]}>
                            {data.map((a,i)=><Cell key={i} fill={clr(a.pct)}/>)}
                          </Bar>
                        </BarChart>
                      </ResponsiveContainer>}
                </Card>
              ))}
            </div>
          )}

          {/* GÉNERO */}
          {tab==="genero" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <Card title="Género × Concepto (Global)" col="1/-1">
                <ResponsiveContainer width="100%" height={220}>
                  <BarChart data={CK.map(c=>({concepto:c.label,Femenino:T9.f[c.k],Masculino:T9.m[c.k]}))}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                    <XAxis dataKey="concepto" tick={{fontSize:8}} interval={0}/>
                    <YAxis domain={[0,100]} tickFormatter={v=>`${v}%`} tick={{fontSize:9}}/>
                    <Tooltip formatter={v=>`${v?.toFixed(1)}%`}/>
                    <Legend wrapperStyle={{fontSize:10}}/>
                    <Bar name="Femenino" dataKey="Femenino" fill="#ec4899" radius={[4,4,0,0]}/>
                    <Bar name="Masculino" dataKey="Masculino" fill="#6366f1" radius={[4,4,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </Card>
              {[{e:entA,d:T6[entA]},...(cmp?[{e:entB,d:T6[entB]}]:[])].map(({e,d})=>(
                <Card key={e} title={`Género — ${entLabel(e)}`}>
                  {[{g:"Femenino",v:d?.f,col:"#ec4899"},{g:"Masculino",v:d?.m,col:"#6366f1"}].filter(r=>r.v!=null).map((r,i)=>(
                    <div key={i} style={{marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:13,fontWeight:600}}>{r.g}</span>
                        <span style={{fontSize:14,fontWeight:700,color:clr(r.v)}}>{r.v?.toFixed(1)}%</span>
                      </div>
                      <div style={{background:"#f1f5f9",borderRadius:99,height:10}}>
                        <div style={{width:`${r.v}%`,height:"100%",borderRadius:99,background:r.col}}/>
                      </div>
                    </div>
                  ))}
                </Card>
              ))}
            </div>
          )}

          {/* TIPO */}
          {tab==="tipo" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <Card title="Tipo × Concepto (Global)" col="1/-1">
                <ResponsiveContainer width="100%" height={220}>
                  <BarChart data={CK.map(c=>({concepto:c.label,Contratista:T10.contratista[c.k],Vinculado:T10.vinculado[c.k],Otro:T10.otro[c.k]}))}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                    <XAxis dataKey="concepto" tick={{fontSize:8}} interval={0}/>
                    <YAxis domain={[0,100]} tickFormatter={v=>`${v}%`} tick={{fontSize:9}}/>
                    <Tooltip formatter={v=>`${v?.toFixed(1)}%`}/>
                    <Legend wrapperStyle={{fontSize:10}}/>
                    <Bar name="Contratista" dataKey="Contratista" fill={C[0]} radius={[4,4,0,0]}/>
                    <Bar name="Vinculado"   dataKey="Vinculado"   fill={C[1]} radius={[4,4,0,0]}/>
                    <Bar name="Otro"        dataKey="Otro"        fill={C[2]} radius={[4,4,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </Card>
              {[{e:entA,d:T7[entA]},...(cmp?[{e:entB,d:T7[entB]}]:[])].map(({e,d})=>(
                <Card key={e} title={`Tipo — ${entLabel(e)}`}>
                  {["contratista","vinculado","otro"].map((t,i)=>d?.[t]!=null&&
                    <SBar key={i} label={cap(t)} p={d[t]} color={C[i]}/>)}
                </Card>
              ))}
              <Card title="Comparativo por Tipo" col="1/-1">
                <BarsChart data={tipoData} kA={entA} kB={entB} xKey="name" h={180}/>
              </Card>
            </div>
          )}

          {/* OCUPACIÓN */}
          {tab==="ocupacion" && (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <Card title={`Ocupación${cmp?` — ${entLabel(entA)} vs ${entLabel(entB)}`:` — ${entLabel(entA)}`}`} col="1/-1">
                <BarsChart data={ocupData} kA={entA} kB={entB} xKey="name" h={220}/>
              </Card>
              {[{e:entA,d:T8[entA]},...(cmp?[{e:entB,d:T8[entB]}]:[])].map(({e,d})=>(
                <Card key={e} title={`Detalle — ${entLabel(e)}`}>
                  {Object.entries(d||{}).filter(([,v])=>v!=null).sort((a,b)=>b[1]-a[1]).map(([o,p],i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                      padding:"6px 10px",marginBottom:5,borderRadius:7,background:bg(p)}}>
                      <span style={{fontSize:12,fontWeight:600,color:"#1e293b"}}>{cap(o)}</span>
                      <span style={{fontSize:15,fontWeight:700,color:fc(p)}}>{p?.toFixed(1)}%</span>
                    </div>
                  ))}
                </Card>
              ))}
            </div>
          )}

          {/* FOOTER */}
          <div style={{marginTop:18,borderTop:"1px solid #e2e8f0",paddingTop:12,
            display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
            <div style={{fontSize:10,color:"#64748b"}}>
              <strong>Desarrollo:</strong> Julián Alberto Uribe Gómez —{" "}
              <a href="mailto:julian.uribe@medellin.gov.co" style={{color:"#6366f1"}}>julian.uribe@medellin.gov.co</a>
            </div>
            <div style={{fontSize:10,color:"#64748b"}}>
              <strong>Supervisión:</strong> Jorge Iván Brand Ortiz PhD —{" "}
              <a href="mailto:jorge.brand@medellin.gov.co" style={{color:"#6366f1"}}>jorge.brand@medellin.gov.co</a>
            </div>
          </div>

        </div>
      );
    }

    ReactDOM.render(<App/>, document.getElementById("root"));
  </script>
</body>
</html>
